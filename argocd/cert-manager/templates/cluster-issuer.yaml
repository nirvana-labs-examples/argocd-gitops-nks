{{- if .Values.letsencryptEmail }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuerName }}
spec:
  acme:
    email: {{ .Values.letsencryptEmail }}
    server: {{ .Values.acmeServer }}
    privateKeySecretRef:
      name: {{ .Values.issuerName }}-account-key
    solvers:
      - http01:
          ingress:
            class: cilium
{{- end }}
